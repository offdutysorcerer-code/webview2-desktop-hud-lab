<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>A15 Pet HUD</title>
<style>
:root{font-family:"Segoe UI","Microsoft JhengHei",sans-serif;color-scheme:dark}
*{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#05131e}
.shell{height:100%;padding:18px;background:radial-gradient(circle at 85% 0,#0a405466,transparent 45%),linear-gradient(145deg,#071a28,#040d16)}
.header{display:flex;align-items:center;gap:11px;padding:2px 2px 16px;border-bottom:1px solid #52eaff25}
.logo{width:27px;height:27px;border:2px solid #62f5ff;transform:rotate(45deg);box-shadow:0 0 12px #00dfff88}
.title{flex:1}.title b{display:block;color:#c5fbff;letter-spacing:2px;font-size:14px}.title small{color:#629ba8}
.close{width:31px;height:31px;border:1px solid #52eaff44;border-radius:50%;background:#092331;color:#a9edf2;cursor:pointer}
h2{font-size:12px;letter-spacing:2px;color:#70aeb7;font-weight:500;margin:17px 0 11px}
.choices{display:grid;gap:11px}
.card{position:relative;display:grid;grid-template-columns:72px 1fr;gap:13px;align-items:center;width:100%;padding:12px;border:1px solid #3ec8db35;border-radius:14px;background:#092331b8;color:#c9f7fa;text-align:left;cursor:pointer;transition:.18s}
.card:hover{transform:translateY(-1px);border-color:#55edff88;background:#0c3040}
.card.active{border-color:#5cf2ff;box-shadow:0 0 18px #00dfff25,inset 0 0 14px #00dfff0c}
.preview{height:62px;border-radius:11px;display:grid;place-items:center;background:#03101a;border:1px solid #37bfd833;overflow:hidden}
.pet2d{width:38px;height:29px;border:2px solid #6af5ff;border-radius:12px 12px 15px 15px;position:relative;box-shadow:0 0 10px #00eaff88}
.pet2d:before,.pet2d:after{content:"";position:absolute;top:9px;width:5px;height:5px;border-radius:50%;background:#aaffff;box-shadow:0 0 6px #00eaff}.pet2d:before{left:8px}.pet2d:after{right:8px}
.cube{width:31px;height:31px;border:2px solid #6af5ff;transform:rotateX(58deg) rotateZ(45deg);box-shadow:0 0 12px #00eaff88,inset 0 0 12px #00eaff44}
.copy b{display:block;font-size:14px;margin-bottom:4px}.copy small{color:#6fa5ae;line-height:1.4}
.tag{position:absolute;right:10px;top:9px;padding:3px 7px;border-radius:999px;background:#123948;color:#72eaf3;font:9px Consolas}
.footer{margin-top:15px;padding:12px;border-radius:12px;background:#061722;color:#5e929c;font-size:11px;line-height:1.55;border:1px solid #44dcec1e}
</style></head>
<body><main class="shell">
<div class="header"><div class="logo"></div><div class="title"><b>A15 PET LAB</b><small>Desktop companion selector</small></div><button class="close" onclick="send('close')">×</button></div>
<h2>SELECT COMPANION</h2>
<div class="choices">
<button class="card active" data-pet="2d"><span class="preview"><i class="pet2d"></i></span><span class="copy"><b>2D 電子寵物</b><small>HTML / CSS 動畫<br>輕量、清晰、可換 GIF</small></span><i class="tag">DOM</i></button>
<button class="card" data-pet="3d"><span class="preview"><i class="cube"></i></span><span class="copy"><b>3D 電子寵物</b><small>Three.js / WebGL<br>立體光照、旋轉與動畫</small></span><i class="tag">WEBGL</i></button>
</div>
<div class="footer">選擇會立即套用到滑鼠旁的透明寵物層，不需重新啟動程式。</div>
</main>
<script>
const send=(action,extra={})=>chrome.webview.postMessage({action,...extra});
document.querySelectorAll('.card').forEach(card=>card.addEventListener('click',()=>{
 document.querySelectorAll('.card').forEach(x=>x.classList.remove('active'));
 card.classList.add('active');send('setPet',{mode:card.dataset.pet});
}));
</script></body></html>
